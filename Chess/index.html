<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <title>Tiệm Tạp Hoá – Chọn trò chơi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111827;
      color: #e5e7eb;
    }
    .container {
      text-align: center;
      padding: 2rem 3rem;
      border-radius: 1rem;
      background: #1f2937;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      max-width: 560px;
    }
    h1 {
      margin-bottom: 1.2rem;
      font-size: 2rem;
    }
    .subtitle {
      margin-bottom: 0.5rem;
      color: #9ca3af;
    }
    .warning {
      margin-bottom: 2rem;
      font-size: 0.9rem;
      color: #fbbf24; /* vàng cảnh báo nhẹ */
    }
    .buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    a {
      text-decoration: none;
    }
    .btn {
      padding: 0.9rem 1.6rem;
      border-radius: 999px;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.2s;
      background: #3b82f6;
      color: white;
      display: inline-block;
      min-width: 200px;
    }
    .btn.secondary {
      background: #10b981;
    }
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.35);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tiệm Tạp Hoá</h1>
    <p class="subtitle">Chọn một trò chơi bên dưới:</p>
    <p class="warning">⚠️ Trang web này hoạt động tốt nhất trên máy tính (desktop/laptop).</p>

    <div class="buttons">
      <!-- Nối Màu Ngưu Ma Vương -->
      <a href="./NguuMa.html">
        <button class="btn">Ngưu Ma Vương</button>
      </a>

      <!-- Cờ Tướng -->
      <a href="./CoTuong.html">
        <button class="btn secondary">Cờ Tướng</button>
      </a>
    </div>
  </div>
</body>
</html>
